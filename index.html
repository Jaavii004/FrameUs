<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameUs</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&display=swap"
        rel="stylesheet">
    <script src="lib/fabric.min.js"></script>
    <script src="js/script.js" defer></script>
</head>

<body class="canva-layout">
    <nav class="side-nav">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="var(--accent-primary)">
                <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
            </svg>
        </div>
        <button class="nav-item active" data-tab="uploads">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M9,16V10H5L12,3L19,10H15V16H9M5,20V18H19V20H5Z" />
            </svg>
            <span>Subidas</span>
        </button>
        <button class="nav-item" data-tab="text">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path
                    d="M13,12H20V13.5H13V12M13,9.5H20V11H13V9.5M13,14.5H20V16H13V14.5M21,4H3A2,2 0 0,0 1,6V18A2,2 0 0,0 3,20H21A2,2 0 0,0 23,18V6A2,2 0 0,0 21,4M21,18H3V6H21V18M8,7H11L12,17H10.5L10.25,14H8.75L8.5,17H7L8,7M9,13H10L9.5,8L9,13Z" />
            </svg>
            <span>Texto</span>
        </button>
        <button class="nav-item" data-tab="background">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path
                    d="M19,3H5C3.89,3 3,3.89 3,5V19C3,20.11 3.89,21 5,21H19C20.11,21 21,20.11 21,19V5C21,3.89 20.11,3 19,3M19,19H5V5H19V19M17,17H7V7H17V17M15,15H9V9H15V15Z" />
            </svg>
            <span>Fondo</span>
        </button>
        <button class="nav-item" data-tab="layers">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path
                    d="M12,16L19.36,10.27L21,9L12,2L3,9L4.63,10.27L12,16M12,18.54L4.62,12.81L3,14.07L12,21.07L21,14.07L19.37,12.81L12,18.54Z" />
            </svg>
            <span>Capas</span>
        </button>
        <button class="nav-item" data-tab="textures">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path
                    d="M19.35,10.04C18.67,6.59 15.64,4 12,4C9.11,4 6.6,5.64 5.35,8.04C2.34,8.36 0,10.91 0,14C0,17.31 2.69,20 6,20H19C21.76,20 24,17.76 24,15C24,12.36 21.95,10.22 19.35,10.04Z" />
            </svg>
            <span>Texturas</span>
        </button>
    </nav>

    <aside class="side-panel">
        <div class="panel-content active" id="tab-uploads">
            <h3>Tus Fotos</h3>
            <label for="image-upload" class="upload-area">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="var(--text-muted)">
                    <path
                        d="M19.35,10.04C18.67,6.59 15.64,4 12,4C9.11,4 6.6,5.64 5.35,8.04C2.34,8.36 0,10.91 0,14C0,17.31 2.69,20 6,20H19C21.76,20 24,17.76 24,15C24,12.36 21.95,10.22 19.35,10.04M19,18H6C3.79,18 2,16.21 2,14C2,11.95 3.53,10.24 5.56,10.03L6.63,9.92L7.13,8.97C8.08,7.14 9.94,6 12,6C14.62,6 16.88,7.86 17.39,10.43L17.69,11.93L19.22,12.04C20.78,12.14 22,13.45 22,15C22,16.65 20.65,18 19,18M8,13H11V17H13V13H16L12,8L8,13Z" />
                </svg>
                <p>Haz clic o arrastra para subir</p>
                <input type="file" id="image-upload" accept="image/*" multiple hidden>
            </label>
            <div class="image-grid" id="uploaded-images-grid"></div>
        </div>

        <div class="panel-content" id="tab-text">
            <h3>Texto Máscara</h3>
            <div class="control-group">
                <label>Número o Palabra</label>
                <input type="text" id="mask-text" value="18" placeholder="Ej: 18, 21, HOLA">
                <p class="hint">Define la forma del collage</p>
            </div>
            <div class="control-group">
                <label>Fuente</label>
                <select id="font-family">
                    <option value="Inter" selected>Inter (Moderno)</option>
                    <option value="Montserrat">Montserrat (Grueso Pro)</option>
                    <option value="Impact">Impact (Clásico Grueso)</option>
                    <option value="Arial">Arial (Sencillo)</option>
                    <option value="Georgia">Georgia (Serif)</option>
                    <option value="'Courier New', Courier, monospace">Monoespaciado</option>
                    <option value="'Times New Roman', Times, serif">Clásico</option>
                </select>
            </div>
            <div class="control-group">
                <label>Espaciado (Letter Spacing)</label>
                <input type="range" id="input-char-spacing" min="-100" max="500" value="0">
            </div>
        </div>

        <div class="panel-content" id="tab-textures">
            <h3>Texturas Pro</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">Aplica efectos directamente a
                tus números.</p>
            <div class="texture-grid">
                <button class="texture-btn" data-texture="none">Ninguna</button>
                <button class="texture-btn" data-texture="noise"
                    style="background-image: url('assets/textures/noise.png');">Ruido</button>
                <button class="texture-btn" data-texture="paper"
                    style="background-image: url('assets/textures/paper.png');">Papel</button>
                <button class="texture-btn" data-texture="dust"
                    style="background-image: url('assets/textures/dust.png');">Polvo</button>
            </div>
        </div>

        <div class="panel-content" id="tab-background">
            <h3>Fondo del Canvas</h3>
            <div class="control-group">
                <label>Color Sólido</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="color" id="bg-color-picker" value="#1a1a24"
                        style="width: 50px; padding: 0; height: 40px;">
                    <button id="btn-set-transparent" class="btn btn-outline-light btn-sm"
                        style="flex: 1; font-size: 0.8rem;">Fondo Transparente</button>
                </div>
            </div>
            <div class="control-group">
                <label>Degradados Rápidos</label>
                <div class="gradient-grid">
                    <button class="grad-btn" style="background: linear-gradient(135deg, #121212, #333333)"
                        data-grad="linear-gradient(135deg, #121212, #333333)"></button>
                    <button class="grad-btn" style="background: linear-gradient(135deg, #1a1a24, #2d2d4a)"
                        data-grad="linear-gradient(135deg, #1a1a24, #2d2d4a)"></button>
                    <button class="grad-btn" style="background: linear-gradient(135deg, #2e1065, #4c1d95)"
                        data-grad="linear-gradient(135deg, #2e1065, #4c1d95)"></button>
                    <button class="grad-btn" style="background: linear-gradient(135deg, #064e3b, #065f46)"
                        data-grad="linear-gradient(135deg, #064e3b, #065f46)"></button>
                </div>
            </div>
        </div>

        <div class="panel-content" id="tab-layers">
            <h3>Capas</h3>
            <div id="layers-list" class="layers-list">
                <!-- Se llenará dinámicamente -->
            </div>
            <button id="btn-clear" class="btn btn-outline-danger" style="margin-top: 2rem;">Borrar Todo</button>
        </div>
    </aside>

    <main class="editor-area">
        <header class="top-bar" id="context-toolbar">
            <div class="context-group" id="selection-controls" style="display: none;">
                <!-- Transformation Group -->
                <div class="tool-group">
                    <div class="tool-item">
                        <label>Opacidad</label>
                        <input type="range" id="input-opacity" min="0" max="100" value="100" style="width: 60px;">
                    </div>
                    <div class="compact-group">
                        <button class="tool-btn" id="btn-flip-h" title="Voltear Horizontal">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                <path
                                    d="M15,21L12,24L9,21V18L12,15L15,18V21M9,3L12,0L15,3V6L12,9L9,6V3M3,15L0,12L3,9H6L9,12L6,15H3M21,9L24,12L21,15H18L15,12L18,9H21Z" />
                            </svg>
                        </button>
                        <button class="tool-btn" id="btn-flip-v" title="Voltear Vertical">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" transform="rotate(90)">
                                <path
                                    d="M15,21L12,24L9,21V18L12,15L15,18V21M9,3L12,0L15,3V6L12,9L9,6V3M3,15L0,12L3,9H6L9,12L6,15H3M21,9L24,12L21,15H18L15,12L18,9H21Z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Resize & Crop Group -->
                <div class="compact-group">
                    <button class="tool-btn" id="btn-smart-fill" title="Ajustar Automáticamente">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path
                                d="M4,4H9V6H6V9H4V4M15,4H20V9H18V6H15V4M4,15H6V18H9V20H4V15M18,15H20V20H15V18H18V15M12,8L15,12L12,16L9,12L12,8Z" />
                        </svg>
                    </button>
                    <button class="tool-btn" id="btn-crop" title="Recortar">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path
                                d="M7,17V1H5V5H1V7H5V17A2,2 0 0,0 7,19H17V23H19V19H23V17H7M17,15H19V7C19,5.89 18.1,5 17,5H9V7H17V15Z" />
                        </svg>
                    </button>
                </div>

                <div id="crop-actions" style="display: none; align-items: center; gap: 8px;">
                    <button class="btn btn-success btn-sm" id="btn-crop-confirm">OK</button>
                    <button class="btn btn-outline-danger btn-sm" id="btn-crop-cancel">✕</button>
                </div>

                <div class="divider"></div>

                <!-- Layers & Alignment Group -->
                <div class="compact-group">
                    <button class="tool-btn" id="btn-bring-forward" title="adelantar">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path
                                d="M2 12L7 17V14H12V10H7V7L2 12M15 11H22V13H15V11M15 7H22V9H15V7M15 15H22V17H15V15Z" />
                        </svg>
                    </button>
                    <button class="tool-btn" id="btn-send-backward" title="Atrás">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M22 12L17 7V10H12V14H17V17L22 12M9 11H2V13H9V11M9 7H2V9H9V7M9 15H2V17H9V15Z" />
                        </svg>
                    </button>
                    <button class="tool-btn" id="btn-align-center" title="Centrar">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M19,10H15V4H13V10H11V4H9V10H5V12H9V18H11V12H13V18H15V12H19V10Z" />
                        </svg>
                    </button>
                </div>

                <div class="divider"></div>

                <!-- Effects Group -->
                <div class="compact-group">
                    <button class="tool-btn" id="btn-filter-bw" title="Blanco y Negro">B&N</button>
                    <button class="tool-btn" id="btn-filter-sepia" title="Sepia">Sepia</button>
                    <button class="tool-btn" id="btn-filter-reset" title="Restaurar">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path
                                d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z" />
                        </svg>
                    </button>
                    <button class="tool-btn danger" id="btn-delete-selection" title="Eliminar">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path
                                d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="global-actions">
                <button class="tool-btn" id="btn-undo" title="Deshacer (Ctrl+Z)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path
                            d="M12.5,8C9.85,8 7.45,8.99 5.62,10.59L2,7V16H11L7.38,12.38C8.77,11.22 10.54,10.5 12.5,10.5C16.04,10.5 19.05,12.81 20.1,16L22.47,15.22C21.08,11.03 17.15,8 12.5,8Z" />
                    </svg>
                </button>
                <button class="tool-btn" id="btn-redo" title="Rehacer (Ctrl+Y)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path
                            d="M11.5,8C14.15,8 16.55,8.99 18.38,10.59L22,7V16H13L16.62,12.38C15.23,11.22 13.46,10.5 11.5,10.5C7.96,10.5 4.95,12.81 3.9,16L1.53,15.22C2.92,11.03 6.85,8 11.5,8Z" />
                    </svg>
                </button>
                <div class="divider"></div>
                <button id="btn-download" class="btn btn-success">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M5,20H19V18H5V20M19,9H15V3H9V9H5L12,16L19,9Z" />
                    </svg>
                    <span>Descargar</span>
                </button>
            </div>
        </header>

        <section class="canvas-viewport" id="drop-zone">
            <div class="canvas-container-outer">
                <canvas id="collage-canvas"></canvas>
            </div>
            <div class="drop-indicator">Suelta tus fotos aquí</div>
        </section>
    </main>

</body>

</html>
